name: Lint, Test & Release

on:
  push:
    branches-ignore:
      - 'dependabot/**'
  pull_request:

permissions:
  contents: read

jobs:
  commitlint:
    name: Lint commits
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'
      - name: Install dependencies
        run: npm clean-install
      - name: Lint commit
        if: github.event_name == 'push'
        run: npx commitlint --from HEAD~1 --to HEAD --verbose
      - name: Lint commits
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.head.sha }}~${{ github.event.pull_request.commits }} --to ${{ github.event.pull_request.head.sha }} --verbose
  codelint:
    name: Lint code
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'
      - name: Install dependencies
        run: npm clean-install
      - name: Lint packages
        run: npm run lint:packages
  test-workspaces:
    name: Build & test workspaces (Node ${{ matrix.node }})
    runs-on: ubuntu-24.04
    needs:
      - commitlint
      - codelint
    strategy:
      matrix:
        # Matches the v13 engines field (>=20.3.0) — Node 18 is intentionally
        # excluded because the v13 rewrite targets the AbortSignal.any / native
        # diagnostics_channel.tracingChannel surface that only stabilised in 20.3+.
        node: [20.x, 22.x, 24.x]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - name: Install dependencies
        run: npm clean-install
      - name: Build workspaces
        run: npm run build:workspaces
      - name: Test workspaces
        run: npm run test:workspaces
  coverage-workspaces:
    name: Coverage thresholds (Node 22)
    runs-on: ubuntu-24.04
    needs:
      - commitlint
      - codelint
    # Coverage thresholds rely on the `--test-coverage-lines` /
    # `--test-coverage-functions` / `--test-coverage-branches` CLI flags,
    # which were stabilised in Node 22. Test on a single recent Node version;
    # the per-Node test matrix (test-workspaces) covers compatibility.
    #
    # The `@tediousjs/mssql-tedious` package's `test:coverage` script runs
    # both unit and integration tests so the driver runtime (which is only
    # exercised end-to-end against a real server) hits the threshold. That
    # requires a live SQL Server reachable via MSSQL_TEST_*; we spin one up
    # here as a service container and forward the SA password through.
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: 'yourStrong(!)Password'
        ports:
          - 1433:1433
        # Healthcheck — `docker run` waits for the container's healthcheck
        # before the job's `steps:` start, so the test process never races
        # with SQL Server boot. `start-period` covers the ~10–20s engine
        # warm-up; sqlcmd at `/opt/mssql-tools18/bin/sqlcmd` is the path
        # current `mssql/server:2022-latest` images ship.
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'yourStrong(!)Password' -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 30s
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'
      - name: Install dependencies
        run: npm clean-install
      - name: Build workspaces
        run: npm run build:workspaces
      - name: Run coverage with thresholds
        # `MSSQL_TEST_PASSWORD` matches the SA password set on the service.
        # Other MSSQL_TEST_* vars take their defaults from
        # `packages/tedious/test/integration.ts` (host=localhost,
        # port=1433, user=sa, database=master).
        env:
          MSSQL_TEST_PASSWORD: 'yourStrong(!)Password'
        run: npm run test:coverage:workspaces
  release:
    name: Release
    concurrency: release
    # The `next-major` exclusion disables semantic-release on the v13 rewrite branch during
    # early development, to avoid publishing pre-releases before the library is ready for
    # external adopters. Remove the `github.ref != 'refs/heads/next-major'` clause when we
    # want to start shipping `13.0.0-next-major.N` alpha releases. See docs/adr/0002-branch-strategy.md.
    if: ${{ github.repository_owner == 'tediousjs' && github.event_name == 'push' && github.actor != 'dependabot[bot]' && github.ref != 'refs/heads/next-major' }}
    runs-on: ubuntu-24.04
    needs:
      - commitlint
      - codelint
      - test-workspaces
      - coverage-workspaces
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm publishing & provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: 'npm'
      - name: Install dependencies
        run: npm clean-install
      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: npm audit signatures
      - name: Release
        env:
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
