services:
  app:
    image: "mcr.microsoft.com/devcontainers/typescript-node:22"

    volumes:
      - "..:/workspace:cached"

    # Overrides default command so things don't shut down after the process ends.
    command: "sleep infinity"

    depends_on:
      - mssql

  # Uses azure-sql-edge rather than mssql/server because the latter has no
  # ARM64 image — running natively on Apple silicon (and other ARM hosts)
  # requires the edge image. Functionally equivalent for the v13 test suite.
  mssql:
    image: "mcr.microsoft.com/azure-sql-edge:latest"

    restart: unless-stopped

    environment:
      - "ACCEPT_EULA=Y"
      - "MSSQL_SA_PASSWORD=yourStrong(!)Password"
